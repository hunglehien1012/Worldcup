name: Cập nhật kết quả World Cup

on:
  # Chạy mỗi 30 phút trong mùa giải (11/06 - 19/07/2026)
  schedule:
    - cron: '*/30 * * * *'

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chạy script cập nhật kết quả
        run: python update_results.py

      - name: Commit và push nếu có thay đổi
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldcup2026.html worldcup2026.js
          if git diff --staged --quiet; then
            echo "Không có thay đổi, bỏ qua."
          else
            git commit -m "🤖 Cập nhật kết quả $(date +'%d/%m/%Y %H:%M') UTC"
            git push
          fi
