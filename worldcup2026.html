            </select>
            <div class="custom-select-wrapper" id="dateSelectWrapper">
              <div class="custom-select-trigger" id="dateSelectTrigger">
                <span class="cs-label" id="dateSelectLabel">Tất cả ngày</span>
                <span class="cs-chevron">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                </span>
              </div>
              <div class="custom-select-dropdown" id="dateSelectDropdown"></div>
            </div>
          </div>
          <div class="filter-group">
            <label>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M8 6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V6"
                />
                <path
                  d="M4 10a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"
                />
              </svg>
              <span class="i18n" data-vi="Bảng đấu" data-en="Group"
                >Bảng đấu</span
              >
            </label>
            <select id="groupFilter" style="display:none">
              <option value="">Tất cả bảng</option>
              <option value="BẢNG A">Bảng A</option>
              <option value="BẢNG B">Bảng B</option>
              <option value="BẢNG C">Bảng C</option>
              <option value="BẢNG D">Bảng D</option>
              <option value="BẢNG E">Bảng E</option>
              <option value="BẢNG F">Bảng F</option>
              <option value="BẢNG G">Bảng G</option>
              <option value="BẢNG H">Bảng H</option>
              <option value="BẢNG I">Bảng I</option>
              <option value="BẢNG J">Bảng J</option>
              <option value="BẢNG K">Bảng K</option>
              <option value="BẢNG L">Bảng L</option>
            </select>
            <div class="custom-select-wrapper" id="groupSelectWrapper">
              <div class="custom-select-trigger" id="groupSelectTrigger">
                <span class="cs-label" id="groupSelectLabel">Tất cả bảng</span>
                <span class="cs-chevron">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                </span>
              </div>
              <div class="custom-select-dropdown" id="groupSelectDropdown"></div>
            </div>
          </div>
          <div class="filter-group full" id="teamFilterGroup">
            <div class="team-filter-label-row">
              <div class="team-filter-label-left">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M15 4l6 2v5h-3v8a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-8H3v-5l6-2a3 3 0 0 0 6 0"
                  />
                </svg>
                <span
                  class="i18n"
                  data-vi="Lọc theo đội bóng"
                  data-en="Filter by Team"
                  >Lọc theo đội bóng</span
                >
              </div>
              <button class="clear-label-btn" id="clearLabelBtn">
                <span class="i18n" data-vi="Xóa tất cả" data-en="Clear all"
                  >Xóa tất cả</span
                >
              </button>
            </div>
            <div class="team-select-wrapper" id="teamSelectWrapper">
              <div class="team-select-trigger" id="teamSelectTrigger">
                <div class="team-chips" id="teamChips">
                  <span class="trigger-placeholder" id="triggerPlaceholder"
                    >Chọn đội bóng...</span
                  >
                </div>
                <svg
                  class="trigger-chevron"
                  id="triggerChevron"
                  xmlns="http://www.w3.org/2000/svg"
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </div>
              <div class="team-dropdown" id="teamDropdown">
                <div class="team-search-box">
                  <input
                    type="text"
                    id="teamSearchInput"
                    autocomplete="off"
                    placeholder="Tìm đội (tiếng Việt hoặc tiếng Anh)..."
                  />
                </div>
                <div class="team-list" id="teamList"></div>
                <button class="clear-all-btn" id="clearAllBtn">
                  <span
                    class="i18n"
                    data-vi="Xóa tất cả lựa chọn"
                    data-en="Clear all selections"
                    >Xóa tất cả lựa chọn</span
                  >
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- /sticky-top -->

      <div class="stats">
        <div class="stat">
          <div class="num" id="statMatches">48</div>
          <div class="lbl i18n" data-vi="Trận đấu" data-en="Matches">
            Trận đấu
          </div>
        </div>
        <div class="stat">
          <div class="num" id="statDays">9</div>
          <div class="lbl i18n" data-vi="Ngày thi đấu" data-en="Match Days">
            Ngày thi đấu
          </div>
        </div>
        <div class="stat">
          <div class="num" id="statGroups">12</div>
          <div class="lbl i18n" data-vi="Bảng đấu" data-en="Groups">
            Bảng đấu
          </div>
        </div>
        <div class="stat">
          <div class="num" id="statTeams">48</div>
          <div class="lbl i18n" data-vi="Đội bóng" data-en="Teams">
            Đội bóng
          </div>
        </div>
      </div>
      <!-- /stats -->

      <div class="schedule-header">
        <button class="hide-finished-btn" id="hideFinishedBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/>
            <path d="M21 12c-2.4 4-5.4 6-9 6c-3.6 0-6.6-2-9-6c2.4-4 5.4-6 9-6c3.6 0 6.6 2 9 6"/>
          </svg>
          <span id="hideFinishedLabel">Ẩn trận đã kết thúc</span>
        </button>
        <div class="week-label" id="weekLabel"></div>
        <div class="schedule-header-spacer"></div>
      </div>
      <div id="schedule"></div>

      <div class="footer">
        <span
          class="i18n"
          data-vi="* Lịch thi đấu có thể thay đổi. Vui lòng theo dõi cập nhật mới nhất."
          data-en="* Schedule subject to change. Please check for latest updates."
          >* Lịch thi đấu có thể thay đổi. Vui lòng theo dõi cập nhật mới
          nhất.</span
        ><br />
        <span class="i18n" data-vi="Nguồn:" data-en="Source:">Nguồn:</span>
        <span>Brian Le</span>
      </div>

      <div class="view-counter">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/>
          <path d="M21 12c-2.4 4-5.4 6-9 6c-3.6 0-6.6-2-9-6c2.4-4 5.4-6 9-6c3.6 0 6.6 2 9 6"/>
        </svg>
        <span class="view-counter-num" id="viewCountNum">...</span>
        <span id="viewCountLabel">lượt xem</span>
      </div>

    </div>



    <!-- TOAST -->
    <div class="ai-toast" id="aiToast"></div>

    <script src="worldcup2026.js"></script>
  </body>
